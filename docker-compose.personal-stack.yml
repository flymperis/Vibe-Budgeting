# Πλήρες stack όπως το είχες στείλει, με διορθώσεις για Vibe Budgeting:
#   - DATABASE_PATH + mount ΦΑΚΕΛΟΥ ./budget-data:/app/data (όχι single-file σε SMB)
# Μυστικά: αντιγραφή από .env.personal-stack.example -> `.env`, συμπλήρωση τιμών.
# Τρέξιμο: docker compose --env-file .env -f docker-compose.personal-stack.yml up -d

services:
  # --- NETWORK GATEWAY ---
  tailscale-personal:
    image: tailscale/tailscale:latest
    container_name: tailscale-personal
    hostname: personal-disk-share
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--advertise-routes=192.168.1.0/24
    volumes:
      - ts_state_personal:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped

  # --- STORAGE & FILES ---
  smb-server:
    image: dperson/samba
    container_name: smb-personal
    network_mode: "service:tailscale-personal"
    depends_on:
      - tailscale-personal
    volumes:
      - "O:/:/mnt:rw"
    command: >
      -u "pixleye;7992"
      -s "Personal-Disk;/mnt;yes;no;no;all;all;all"
      -p
      -n
      -g "min protocol = SMB2"
      -g "ea support = yes"
      -g "vfs objects = fruit streams_xattr"
      -g "fruit:metadata = netatalk"
      -g "fruit:resource = file"
      -g "fruit:aapl = yes"
      -g "fruit:model = MacSamba"
      -g "locking = no"
    restart: unless-stopped

  # --- SMART HOME ---
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: "service:tailscale-personal"
    depends_on:
      - tailscale-personal
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # --- PHOTO ALBUM (IMMICH) ---
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    network_mode: "service:tailscale-personal"
    volumes:
      - "O:/Photos/Immich/Upload:/usr/src/app/upload"
      - "O:/Photos/External:/mnt/external_photos:ro"
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-db
      - REDIS_HOSTNAME=immich-redis
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=postgres
      - DB_DATABASE_NAME=immich
      - IMMICH_MACHINE_LEARNING_URL=http://immich-machine-learning:3003
      - IMMICH_SERVER_BODY_SIZE_LIMIT_MB=500
    depends_on:
      - immich-db
      - immich-redis
    restart: unless-stopped

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumes:
      - immich_model_cache:/cache
    restart: unless-stopped

  immich-db:
    container_name: immich_postgres
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    environment:
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_USER=postgres
      - POSTGRES_DB=immich
    volumes:
      - immich_postgres:/var/lib/postgresql/data
    restart: unless-stopped

  immich-redis:
    container_name: immich_redis
    image: redis:6.2-alpine
    restart: unless-stopped

  # --- BUDGETING TOOL (ACTUAL) ---
  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: actual_budget
    network_mode: "service:tailscale-personal"
    environment:
      - ACTUAL_TRUST_PROXY=1
    volumes:
      - ./actual-data:/data
    restart: unless-stopped

  firefly-db:
    image: mariadb:lts
    container_name: firefly-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=firefly
      - MYSQL_PASSWORD=${FIREFLY_DB_PASSWORD}
      - MYSQL_DATABASE=firefly
    volumes:
      - ./firefly_db:/var/lib/mysql

  firefly-app:
    image: fireflyiii/core:latest
    container_name: firefly-app
    restart: unless-stopped
    network_mode: "service:tailscale-personal"
    depends_on:
      - firefly-db
    environment:
      # Ακριβώς 32 χαρακτήρες — βάλε το δικό σου στο .env ως FIREFLY_APP_KEY
      - APP_KEY=${FIREFLY_APP_KEY}
      - DB_HOST=firefly-db
      - DB_PORT=3306
      - DB_CONNECTION=mysql
      - DB_DATABASE=firefly
      - DB_USERNAME=firefly
      - DB_PASSWORD=${FIREFLY_DB_PASSWORD}
      - TZ=Europe/Athens
      - APP_URL=${FIREFLY_APP_URL:-http://rooftop-disk-share}
    volumes:
      - ./firefly_upload:/var/www/html/storage/upload

  firefly-cron:
    image: alpine:latest
    container_name: firefly-cron
    restart: unless-stopped
    command: >
      sh -c "echo \"0 * * * * wget -qO- http://firefly-app/api/v1/cron/${FIREFLY_CRON_TOKEN}\" | crontab - && crond -f -L /dev/stdout"
    depends_on:
      - firefly-app

  # --- VIBE BUDGETING (Flask / SQLite) ---
  # Φάκελος budget-data σε ΤΟΠΙΚΟ δίσκο αν γίνεται — όχι SMB-only path για τη SQLite.
  # Στο Windows το build.context ως URL (https://github.com/...git#main) συχνά σκάει:
  #   CreateFile ... https:: The filename ... syntax is incorrect
  # Χρησιμοποίησε πάντα τοπικό clone:
  #   git clone https://github.com/flymperis/Vibe-Budgeting.git ./Vibe-Budgeting
  # Ενημέρωση: git -C ./Vibe-Budgeting pull && docker compose build --no-cache vibe-budgeting
  vibe-budgeting:
    build:
      context: ./Vibe-Budgeting
    container_name: vibe-budgeting
    network_mode: "service:tailscale-personal"
    depends_on:
      - tailscale-personal
    environment:
      - DATABASE_PATH=/app/data/database.db
      # Προαιρετικά: FLASK_SECRET_KEY=...  ALLOW_REGISTRATION=false
    volumes:
      - ./budget-data:/app/data
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.41
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --label-enable --cleanup

volumes:
  ts_state_personal:
  immich_postgres:
  immich_model_cache:
