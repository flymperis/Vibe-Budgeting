<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log in — Vibe Budgeting</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="container auth-panel">
        <h1 class="brand-title">Log in</h1>
        <p class="small-hint">Vibe Budgeting</p>

        {% with flashes = get_flashed_messages(with_categories=true) %}
            {% if flashes %}
                <div class="flash-stack" role="status">
                    {% for category, message in flashes %}
                        <p class="flash flash-{{ category }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('login') }}" class="auth-form">
            <input type="hidden" name="next" value="{{ next }}">
            <label>
                Username
                <input type="text" name="username" autocomplete="username" required autofocus>
            </label>
            <label>
                Password
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <button type="submit">Log in</button>
        </form>

        {% if allow_registration %}
        <p class="auth-footer"><a href="{{ url_for('register') }}">Create an account</a></p>
        {% endif %}
    </main>
</body>
</html>
