services:
  budget-app:
    build: .
    container_name: budget-app
    ports:
      - "5000:5000"
    environment:
      # Folder mount avoids many \"unable to open database file\" issues vs binding a single db file (SMB/NFS).
      - DATABASE_PATH=/app/data/database.db
    volumes:
      - ./budget-data:/app/data
    restart: unless-stopped
