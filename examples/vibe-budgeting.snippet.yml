# Fragment: paste under `services:` in your docker-compose.yml.
# Prerequisites: this repo is cloned as ./Vibe-Budgeting next to your compose file (or change `context`).
#
#   git clone https://github.com/flymperis/Vibe-Budgeting.git Vibe-Budgeting
#
# Create host dir once: mkdir -p budget-data

services:
  vibe-budgeting:
    build:
      context: ./Vibe-Budgeting
      dockerfile: Dockerfile
    container_name: vibe-budgeting
    ports:
      - "5000:5000"
    environment:
      - DATABASE_PATH=/app/data/database.db
      # - FLASK_SECRET_KEY=replace-with-long-random-string
      # - ALLOW_REGISTRATION=true
    volumes:
      - ./budget-data:/app/data
    restart: unless-stopped
